version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Deepak@003
      MYSQL_DATABASE: student_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend

    container_name: springboot-container

    depends_on:
      - mysql

    ports:
      - "8080:8080"

    restart: always

  frontend:
    build: ./my-app

    container_name: react-container

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  mysql-data: